name: PR Lint and Checks

on:
  pull_request:
    branches:
      - master
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Dates
        run: python checks/date_check.py --report

      - name: Check Spelling
        run: python checks/spell_check.py --report

      - name: Check URLs (New additions only)
        run: python checks/url_check.py --diff-only --report

name: Daily Event Automation

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-all-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Fetchers
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
        continue-on-error: true
        run: |
          python fetchers/bigevent.py &
          python fetchers/developer_events.py &
          python fetchers/dev_events.py &
          python fetchers/papercall.py &
          python fetchers/flagships.py &
          python fetchers/meetup.py &
          # python fetchers/eventbrite.py &
          python fetchers/luma.py &
          python fetchers/infosec.py &
          python fetchers/joindin.py &
          python fetchers/adatosystems.py &
          python fetchers/cncf.py &
          python fetchers/gdg.py &
          python fetchers/devopsdays.py &
          python fetchers/linuxfoundation.py &
          python fetchers/gemini_discovery.py &
          
          # Wait for all background fetchers to finish
          wait

      - name: Aggregate and Deduplicate
        run: |
          python aggregate.py
          python checks/date_check.py --fix
          python checks/spell_check.py --fix
          python checks/url_check.py --diff-only --fix
          python dedupe_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if ! git diff --staged --quiet; then
            EVENTS_ADDED=$(cat events_added_count.txt || echo "multiple")
            git commit -m "chore: auto-update $EVENTS_ADDED new events"
            git pull --rebase origin master
            git push
          else
            echo "No new events or changes found. Skipping commit."
          fi

      - name: Create Failure Issue
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Workflow Failed: update-all-events',
              body: `The scheduled workflow **update-all-events** has failed.\n\nPlease check the logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['report', 'automated issue']
            })

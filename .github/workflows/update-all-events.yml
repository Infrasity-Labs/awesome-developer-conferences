name: Daily Event Automation

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-all-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Fetch from Bigevent
        run: python fetchers/bigevent.py
        continue-on-error: true
      - name: Fetch from Developer Events
        run: python fetchers/developer_events.py
        continue-on-error: true
      - name: Fetch from Dev Events
        run: python fetchers/dev_events.py
        continue-on-error: true
      - name: Fetch from Papercall
        run: python fetchers/papercall.py
        continue-on-error: true
      - name: Fetch from Flagships
        run: python fetchers/flagships.py
        continue-on-error: true
      - name: Fetch from Meetup
        run: python fetchers/meetup.py
        continue-on-error: true
      # - name: Fetch from Eventbrite
      #   run: python fetchers/eventbrite.py
      #   continue-on-error: true
      - name: Fetch from Luma
        run: python fetchers/luma.py
        continue-on-error: true
      - name: Fetch from Infosec
        run: python fetchers/infosec.py
        continue-on-error: true
      - name: Fetch from Joindin
        run: python fetchers/joindin.py
        continue-on-error: true
      - name: Fetch from Adatosystems
        run: python fetchers/adatosystems.py
        continue-on-error: true
      - name: Fetch from CNCF
        run: python fetchers/cncf.py
        continue-on-error: true
      - name: Fetch from GDG
        run: python fetchers/gdg.py
        continue-on-error: true
      - name: Fetch from DevOpsDays
        run: python fetchers/devopsdays.py
        continue-on-error: true

      - name: Fetch from Linux Foundation
        run: python fetchers/linuxfoundation.py
        continue-on-error: true
      - name: Fetch from Gemini AI Discovery
        run: python fetchers/gemini_discovery.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      - name: Aggregate and Deduplicate
        run: |
          python aggregate.py
          python checks/date_check.py --fix
          python checks/spell_check.py --fix
          python checks/url_check.py --diff-only --fix
          python dedupe_readme.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if ! git diff --staged --quiet; then
            EVENTS_ADDED=$(cat events_added_count.txt || echo "multiple")
            git commit -m "chore: auto-update $EVENTS_ADDED new events"
            git pull --rebase origin master
            git push
          else
            echo "No new events or changes found. Skipping commit."
          fi

      - name: Create Failure Issue
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Workflow Failed: update-all-events',
              body: `The scheduled workflow **update-all-events** has failed.\n\nPlease check the logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['report', 'automated issue']
            })

name: Daily Event Automation

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Fetchers
        run: |
          python fetchers/bigevent.py
          python fetchers/developer_events.py
          python fetchers/dev_events.py
          python fetchers/papercall.py
          python fetchers/flagships.py
          python fetchers/meetup.py
          python fetchers/eventbrite.py
          python fetchers/luma.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update all events"
            git push
          else
            echo "No new events or changes found. Skipping commit."
          fi

name: Cleanup Broken Links

on:
  schedule:
    # Run once a week on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  cleanup-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find and remove broken links
        run: |
          python checks/url_check.py --all --fix
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-remove dead links"
            git pull --rebase origin master
            git push
          else
            echo "No broken links found. Everything is clean!"
          fi

      - name: Create Failure Issue
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Workflow Failed: cleanup-links',
              body: `The scheduled workflow **cleanup-links** has failed.\n\nPlease check the logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['report', 'automated issue']
            })

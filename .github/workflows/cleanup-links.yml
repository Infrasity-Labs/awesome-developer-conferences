name: Cleanup Broken Links

on:
  schedule:
    # Run once a week on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write
  issues: write

jobs:
  cleanup-links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Find broken links
        id: url_check
        run: |
          python checks/url_check.py --all --report > dead_links_report.md
        continue-on-error: true

      - name: Create Issue From File
        if: steps.url_check.outcome == 'failure'
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5
        with:
          title: Broken links detected in README
          content-filepath: dead_links_report.md
          labels: report, automated issue

      - name: Create Failure Issue
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Workflow Failed: cleanup-links',
              body: `The scheduled workflow **cleanup-links** has failed.\n\nPlease check the logs: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['report', 'automated issue']
            })
